spring.application.name=learn-spring-framework
spring.profiles.active=test
spring.datasource.url=jdbc:hsqldb:mem:localhost
spring.datasource.driver-class-name=org.hsqldb.jdbcDriver
spring.sql.init.mode=always
logging.level.org.springframework.jdbc.datasource.init=DEBUG
spring.jpa.defer-datasource-initialization=true

# JPA / Hibernate debug and init settings
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.defer-datasource-initialization=true
# Keep Hibernate from overriding schema.sql during debugging; adjust as needed
spring.jpa.hibernate.ddl-auto=none

# More logging for Hibernate SQL and binding values
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE

logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.engine.transaction=DEBUG
spring.security.user.name=user
spring.security.user.password=password
